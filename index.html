        // PWAインストール関連
        let deferredPrompt;
        const installBanner = document.getElementById('installBanner');
        const installButton = document.getElementById('installButton');
        const closeInstall = document.getElementById('closeInstall');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBanner.classList.remove('hidden');
        });

        installButton.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            console.log('インストール結果:', outcome);
            deferredPrompt = null;
            installBanner.classList.add('hidden');
        });

        closeInstall.addEventListener('click', () => {
            installBanner.classList.add('hidden');
        });

        window.addEventListener('appinstalled', () => {
            installBanner.classList.add('hidden');
            console.log('アプリがインストールされました');
        });

        // メインアプリケーション
        let currentLang = 'ja';
        let isDark = true;
        let currentSpotId = null;

        const container = document.getElementById('spotsContainer');
        const detailView = document.getElementById('detailView');
        const listView = document.getElementById('listView');
        const detailContent = document.getElementById('detailContent');
        const backButtonContainer = document.getElementById('backButtonContainer');
        const langBtns = document.querySelectorAll('.lang-btn');
        const themeToggle = document.getElementById('themeToggle');
        const mainTitle = document.getElementById('main-title');
        const mainSub = document.getElementById('main-sub');

        const titles = {
            ja: '🌸 桜の名所リフト',
            en: '🌸 Cherry Blossom Spots',
            zh: '🌸 樱花名胜'
        };
        const subs = {
            ja: '一生に一度は見たい絶景桜スポット',
            en: 'Must-see cherry blossom spots in Japan',
            zh: '一生必看的樱花名胜'
        };

        // 画像エラーハンドラ
        function handleImageError(img) {
            img.style.display = 'none';
            const parent = img.parentNode;
            const placeholder = document.createElement('div');
            placeholder.className = 'image-error';
            placeholder.textContent = '🌸 ' + (img.alt || '画像準備中');
            parent.appendChild(placeholder);
        }

        // 一覧表示
        function renderSpots(lang) {
            const data = spotsData[lang];
            container.innerHTML = '';
            data.forEach(spot => {
                const card = document.createElement('div');
                card.className = 'spot-card';
                card.setAttribute('data-id', spot.id);
                
                const img = document.createElement('img');
                img.src = spot.imageUrl;
                img.alt = spot.title;
                img.onerror = function() { handleImageError(this); };
                img.onload = function() {
                    // 画像読み込み成功時の処理（必要に応じて）
                };
                
                const imgDiv = document.createElement('div');
                imgDiv.className = 'card-img';
                imgDiv.appendChild(img);
                
                const contentDiv = document.createElement('div');
                contentDiv.className = 'card-content';
                contentDiv.innerHTML = `
                    <div class="card-title">${spot.title}</div>
                    <div class="card-location">${spot.location}</div>
                    <div class="card-best-time">${spot.bestTime}</div>
                `;
                
                card.appendChild(imgDiv);
                card.appendChild(contentDiv);
                card.addEventListener('click', () => showDetail(spot.id));
                container.appendChild(card);
            });
        }

        // 詳細表示
        function showDetail(spotId) {
            currentSpotId = spotId;
            const spot = spotsData[currentLang].find(s => s.id === spotId);
            if (!spot) return;

            const officialLinkText = {
                ja: '公式ホームページへ',
                en: 'Official Website',
                zh: '官方网站'
            };

            detailContent.innerHTML = '';

            // 画像要素の作成
            const img = document.createElement('img');
            img.src = spot.imageUrl;
            img.alt = spot.title;
            img.className = 'detail-image';
            img.onerror = function() { 
                this.style.display = 'none';
                const placeholder = document.createElement('div');
                placeholder.className = 'image-error';
                placeholder.textContent = '🌸 ' + spot.title;
                this.parentNode.insertBefore(placeholder, this);
            };
            detailContent.appendChild(img);
            
            // テキスト要素の作成
            const textDiv = document.createElement('div');
            textDiv.innerHTML = `
                <div class="detail-title">${spot.title}</div>
                <div class="detail-location">📍 ${spot.location}</div>
                <div class="detail-best-time">${spot.bestTime}</div>
                <div class="detail-desc">${spot.desc.replace(/\n/g, '<br>')}</div>
                <a href="${spot.officialUrl}" class="official-link" target="_blank" rel="noopener">${officialLinkText[currentLang]} →</a>
            `;
            detailContent.appendChild(textDiv);

            listView.style.display = 'none';
            detailView.classList.remove('hidden');
            backButtonContainer.style.display = 'flex';
            mainTitle.style.display = 'none';
            mainSub.style.display = 'none';
        }

        // 一覧に戻る
        function backToList() {
            listView.style.display = 'block';
            detailView.classList.add('hidden');
            backButtonContainer.style.display = 'none';
            mainTitle.style.display = 'block';
            mainSub.style.display = 'block';
            currentSpotId = null;
        }

        // 言語切替
        function changeLanguage(lang) {
            currentLang = lang;
            renderSpots(currentLang);
            if (currentSpotId) {
                const spotExists = spotsData[currentLang].some(s => s.id === currentSpotId);
                if (spotExists) {
                    showDetail(currentSpotId);
                } else {
                    backToList();
                }
            } else {
                backToList();
            }
            mainTitle.textContent = titles[lang];
            mainSub.textContent = subs[lang];
            
            // アクティブな言語ボタンの更新
            langBtns.forEach(btn => {
                if (btn.dataset.lang === lang) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        // イベントリスナー
        langBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                changeLanguage(btn.dataset.lang);
            });
        });

        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            isDark = !document.body.classList.contains('light-mode');
            themeToggle.innerHTML = isDark ? '🌙 ダークモード / ☀️ クリアモード' : '☀️ クリアモード / 🌙 ダークモード';
        });

        document.getElementById('backToList').addEventListener('click', backToList);

        // 初期表示
        renderSpots('ja');

        // Service Worker登録
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => {
                    console.log('Service Worker error:', err);
                });
            });
        }
    </script>
